<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>Settings</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="settings">
    <div class="app-wrap">
      <header class="site-header">
        <div class="site-header-inner">
          <a class="brand" href="index.html">
            <img class="brand-logo" src="assets/logo.png" alt="" width="40" height="40" />
            <span data-i18n="brandTitle">Income calculator</span>
          </a>
          <button
            type="button"
            class="menu-toggle"
            id="menuToggle"
            data-i18n-aria="ariaOpenMenu"
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="appDrawer"
          >
            <span class="menu-toggle-bar" aria-hidden="true"></span>
            <span class="menu-toggle-bar" aria-hidden="true"></span>
            <span class="menu-toggle-bar" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <main>
        <h1 data-i18n="titleSettings">Settings</h1>

        <div class="card">
          <div class="setting-row">
            <div>
              <strong data-i18n="languageLabel">Language</strong>
              <div style="font-size: 0.85rem; color: var(--muted)" data-i18n="languageDesc">Choose interface language</div>
            </div>
            <select id="languageSelect" aria-label="Language" style="min-width: 12rem; max-width: 100%"></select>
          </div>
          <div class="setting-row">
            <div>
              <strong data-i18n="darkMode">Dark mode</strong>
              <div style="font-size: 0.85rem; color: var(--muted)" data-i18n="darkModeDesc">Comfortable viewing at night</div>
            </div>
            <button
              type="button"
              class="toggle"
              id="toggleDark"
              role="switch"
              aria-checked="false"
              data-i18n-aria="darkMode"
              aria-label="Dark mode"
            ></button>
          </div>
          <div class="setting-row">
            <div>
              <strong data-i18n="clearData">Clear all data</strong>
              <div style="font-size: 0.85rem; color: var(--muted)" data-i18n="clearDataDesc">Removes every saved daily entry. This cannot be undone.</div>
            </div>
            <button type="button" class="danger" id="btnClear" data-i18n="clearBtn">Clear all</button>
          </div>
        </div>
      </main>

      <footer class="site-footer">
        <p class="footer-legal">
          © <span id="footerYear"></span> @shubh sharma<sup class="reg">®</sup>
        </p>
      </footer>
    </div>

    <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>
    <aside class="app-drawer" id="appDrawer" aria-hidden="true" aria-label="Side menu">
      <div class="drawer-header">
        <span data-i18n="navMenu">Menu</span>
        <button type="button" class="drawer-close" id="drawerClose" data-i18n-aria="ariaCloseMenu" aria-label="Close menu">×</button>
      </div>
      <nav class="drawer-nav" aria-label="Sections">
        <a href="calendar.html" data-i18n="navCalendar">Calendar</a>
        <a href="history.html" data-i18n="navHistory">History</a>
        <a href="tds.html" data-i18n="navTds">TDS</a>
        <a href="settings.html" aria-current="page" data-i18n="navSettings">Settings</a>
      </nav>
    </aside>

    <script src="js/storage.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script>
      applyThemeFromStorage();
      applyI18n();

      const langSel = document.getElementById('languageSelect');
      fillLanguageSelect(langSel);
      langSel.addEventListener('change', function () {
        updateSettings({ language: langSel.value });
        applyI18n();
        fillLanguageSelect(langSel);
      });

      const toggle = document.getElementById('toggleDark');
      function syncToggle() {
        const on = getSettings().darkMode;
        toggle.setAttribute('aria-checked', on ? 'true' : 'false');
      }
      syncToggle();

      toggle.addEventListener('click', function () {
        toggleDarkMode();
        syncToggle();
      });

      document.getElementById('btnClear').addEventListener('click', function () {
        if (!confirm(t('confirmClear'))) return;
        clearAllEntries();
        alert(t('alertCleared'));
      });
    </script>
    <script src="js/app-shell.js"></script>
  </body>
</html>
