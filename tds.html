<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>TDS — 10% deduction</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="tds">
    <div class="app-wrap">
      <header class="site-header">
        <div class="site-header-inner">
          <a class="brand" href="index.html">
            <img class="brand-logo" src="assets/logo.png" alt="" width="40" height="40" />
            <span data-i18n="brandTitle">Income calculator</span>
          </a>
          <button
            type="button"
            class="menu-toggle"
            id="menuToggle"
            data-i18n-aria="ariaOpenMenu"
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="appDrawer"
          >
            <span class="menu-toggle-bar" aria-hidden="true"></span>
            <span class="menu-toggle-bar" aria-hidden="true"></span>
            <span class="menu-toggle-bar" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <main>
        <h1 data-i18n="titleTds">TDS (10%)</h1>
        <p class="lead" data-i18n="leadTds">Enter your salary amount to see tax deducted at 10% and net pay.</p>

        <div class="card">
          <div class="row">
            <div>
              <label for="salary" data-i18n="labelSalary">Salary (₹)</label>
              <input type="number" id="salary" min="0" step="1" data-i18n-placeholder="phSalary" placeholder="e.g. 25000" />
            </div>
          </div>
          <div class="btn-row">
            <button type="button" class="primary" id="btnCalc" data-i18n="btnCalculate">Calculate</button>
          </div>
        </div>

        <div class="card">
          <h2 style="margin-top: 0" data-i18n="resultTitle">Result</h2>
          <dl class="results">
            <dt data-i18n="tdsAt10">TDS @ 10%</dt>
            <dd id="outTds">—</dd>
            <dt data-i18n="netAfterTds">Net after TDS</dt>
            <dd id="outNet" class="pay">—</dd>
          </dl>
        </div>
      </main>

      <footer class="site-footer">
        <p class="footer-legal">
          © <span id="footerYear"></span> @shubh sharma<sup class="reg">®</sup>
        </p>
      </footer>
    </div>

    <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>
    <aside class="app-drawer" id="appDrawer" aria-hidden="true" aria-label="Side menu">
      <div class="drawer-header">
        <span data-i18n="navMenu">Menu</span>
        <button type="button" class="drawer-close" id="drawerClose" data-i18n-aria="ariaCloseMenu" aria-label="Close menu">×</button>
      </div>
      <nav class="drawer-nav" aria-label="Sections">
        <a href="calendar.html" data-i18n="navCalendar">Calendar</a>
        <a href="history.html" data-i18n="navHistory">History</a>
        <a href="tds.html" aria-current="page" data-i18n="navTds">TDS</a>
        <a href="settings.html" data-i18n="navSettings">Settings</a>
      </nav>
    </aside>

    <script src="js/storage.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script>
      applyThemeFromStorage();
      applyI18n();

      function calc() {
        const v = Number(document.getElementById('salary').value);
        if (!Number.isFinite(v) || v < 0) {
          document.getElementById('outTds').textContent = '—';
          document.getElementById('outNet').textContent = '—';
          return;
        }
        const tds = v * 0.1;
        const net = v - tds;
        document.getElementById('outTds').textContent = '₹' + Math.round(tds).toLocaleString('en-IN');
        document.getElementById('outNet').textContent = '₹' + Math.round(net).toLocaleString('en-IN');
      }

      document.getElementById('btnCalc').addEventListener('click', calc);
      document.getElementById('salary').addEventListener('change', calc);
    </script>
    <script src="js/app-shell.js"></script>
  </body>
</html>
